<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师端 - 心脏听诊实训</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a2a3a; font-family: system-ui; padding: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #2c7da0; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .tab-btn.active { background: #1e466e; }
        .panel { display: none; background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .panel.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .student-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .student-header { background: #2c3e50; color: white; padding: 8px 12px; }
        .video-area { aspect-ratio: 4/3; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .ai-feedback { padding: 8px; background: #f8f9fa; font-size: 0.8rem; border-top: 1px solid #ddd; }
        .room-control { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        button { background: #2c7da0; color: white; border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; }
        .history-item { border-bottom: 1px solid #ddd; padding: 10px; display: flex; gap: 15px; align-items: center; }
        .history-video { width: 160px; background: #000; }
    </style>
</head>
<body>
<div class="tabs">
    <button class="tab-btn active" data-tab="monitor">🖥️ 实时监控</button>
    <button class="tab-btn" data-tab="config">⚙️ 模板配置</button>
    <button class="tab-btn" data-tab="history">📜 历史记录</button>
</div>

<div id="monitor" class="panel active">
    <div class="room-control">
        <span>房间号：</span><input id="roomInput" value="exam001">
        <button id="startTeacherBtn">启动教室</button>
        <span id="status" style="color: green;"></span>
    </div>
    <div id="studentsGrid" class="grid"></div>
</div>

<div id="config" class="panel">
    <h3>📸 上传模拟人标准照片并标注5个听诊区</h3>
    <input type="file" id="templateUpload" accept="image/*">
    <button id="uploadBtn">上传并开始标注</button>
    <canvas id="markingCanvas" style="max-width:100%; display:none; margin-top:10px; border:1px solid #ccc;"></canvas>
    <div id="markingStatus"></div>
    <button id="saveRegionsBtn" style="display:none;">保存5个听诊区位置</button>
</div>

<div id="history" class="panel">
    <h3>📂 学生提交的考核记录</h3>
    <div id="historyList">加载中...</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket = null;
    let peerConnections = new Map(); // studentId -> RTCPeerConnection

    // 启动教室
    document.getElementById('startTeacherBtn').onclick = () => {
        const room = document.getElementById('roomInput').value;
        if (socket) socket.disconnect();
        socket = io();
        socket.emit('teacher-join', room);
        document.getElementById('status').innerText = `教室已启动 (${room})`;
        
        // 监听学生离开
        socket.on('student-left', (studentId) => {
            document.getElementById(`student-${studentId}`)?.remove();
            peerConnections.delete(studentId);
        });
        
        // 处理学生的 offer
        socket.on('offer', async (data) => {
            console.log('收到学生的 offer', data.from);
            const studentId = data.from;
            if (peerConnections.has(studentId)) return;
            const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            peerConnections.set(studentId, pc);
            
            pc.ontrack = (event) => {
                const video = document.createElement('video');
                video.srcObject = event.streams[0];
                video.autoplay = true;
                video.playsInline = true;
                const card = document.createElement('div');
                card.className = 'student-card';
                card.id = `student-${studentId}`;
                card.innerHTML = `<div class="student-header">学生 ${studentId.slice(-6)}</div><div class="video-area"></div><div class="ai-feedback" id="fb-${studentId}">等待AI反馈...</div>`;
                card.querySelector('.video-area').appendChild(video);
                document.getElementById('studentsGrid').appendChild(card);
            };
            
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', { target: studentId, candidate: event.candidate });
                }
            };
            
            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('answer', { target: studentId, answer: pc.localDescription });
        });
        
        // 处理 ice 候选
        socket.on('ice-candidate', async (data) => {
            const pc = peerConnections.get(data.from);
            if (pc && data.candidate) {
                await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });
        
        // 接收 AI 反馈
        socket.on('ai-feedback', (data) => {
            const fbDiv = document.getElementById(`fb-${data.studentId}`);
            if (fbDiv) fbDiv.innerHTML = `${data.message} | ${data.progress}`;
        });
    };
    
    // 模板标注逻辑
    let regionPoints = {}, currentRegion = 0;
    const regionNames = ["二尖瓣区","肺动脉瓣区","主动脉瓣区","主动脉瓣第二听诊区","三尖瓣区"];
    let markingCtx = null;
    document.getElementById('uploadBtn').onclick = () => {
        const file = document.getElementById('templateUpload').files[0];
        if (!file) return alert('请选择图片');
        const formData = new FormData();
        formData.append('template', file);
        fetch('/upload_template', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'ok') {
                    alert('上传成功，请在图片上依次点击5个听诊区');
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.getElementById('markingCanvas');
                        canvas.width = img.width; canvas.height = img.height;
                        markingCtx = canvas.getContext('2d');
                        markingCtx.drawImage(img, 0, 0);
                        canvas.style.display = 'block';
                        currentRegion = 0;
                        regionPoints = {};
                        document.getElementById('markingStatus').innerHTML = `👉 请点击“${regionNames[0]}”的位置`;
                        document.getElementById('saveRegionsBtn').style.display = 'inline-block';
                    };
                    img.src = URL.createObjectURL(file);
                } else alert('上传失败');
            });
    };
    document.getElementById('markingCanvas').onclick = (e) => {
        if (currentRegion >= 5) return;
        const canvas = document.getElementById('markingCanvas');
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        regionPoints[regionNames[currentRegion]] = { x, y };
        markingCtx.fillStyle = 'red';
        markingCtx.beginPath();
        markingCtx.arc(x, y, 5, 0, 2*Math.PI);
        markingCtx.fill();
        markingCtx.fillStyle = 'white';
        markingCtx.fillText(regionNames[currentRegion], x+8, y-5);
        currentRegion++;
        if (currentRegion < 5) document.getElementById('markingStatus').innerHTML = `👉 请点击“${regionNames[currentRegion]}”的位置`;
        else document.getElementById('markingStatus').innerHTML = '✅ 5个点已标注，点击保存';
    };
    document.getElementById('saveRegionsBtn').onclick = () => {
        if (Object.keys(regionPoints).length !== 5) { alert(`请先标注5个点（当前${Object.keys(regionPoints).length}个）`); return; }
        fetch('/save_regions', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ regions: regionPoints }) })
            .then(() => alert('保存成功！学生端将自动使用这些坐标'));
    };
    
    // 历史记录加载
    async function loadHistory() {
        const res = await fetch('/get_submissions');
        const subs = await res.json();
        const container = document.getElementById('historyList');
        if (!subs.length) { container.innerHTML = '暂无记录'; return; }
        container.innerHTML = '';
        subs.forEach(sub => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <div class="history-video"><video src="${sub.videoPath}" controls width="160"></video></div>
                <div><strong>${sub.studentName}</strong><br>${new Date(sub.timestamp).toLocaleString()}<br>正确率: ${sub.report.correctSteps || 0}/${sub.report.total || 5}</div>
                <div style="font-size:0.8rem;">${sub.report.details || ''}</div>
            `;
            container.appendChild(div);
        });
    }
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(btn.dataset.tab).classList.add('active');
            if (btn.dataset.tab === 'history') loadHistory();
        };
    });
</script>
</body>
</html>
