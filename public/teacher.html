<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师端 - 心脏听诊AI实训监控中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #eef2f7; font-family: system-ui, sans-serif; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        .header { background: #1e466e; color: white; padding: 20px; border-radius: 24px; margin-bottom: 20px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px; }
        .config-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .config-title { font-size: 1.2rem; font-weight: bold; color: #1e466e; margin-bottom: 15px; border-left: 4px solid #2c7da0; padding-left: 12px; }
        .order-selector { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 20px; }
        select { padding: 8px; border-radius: 30px; border: 1px solid #ccc; }
        button { background: #2c7da0; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .region-area { margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd; }
        #markingCanvas { max-width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #ccc; display: none; }
        .students-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .student-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .student-header { background: #2c3e50; color: white; padding: 10px 15px; display: flex; justify-content: space-between; }
        .video-preview { aspect-ratio: 4/3; background: #000; }
        .video-preview img { width: 100%; height: 100%; object-fit: cover; }
        .ai-feedback { padding: 10px; background: #f8f9fa; font-size: 0.8rem; border-top: 1px solid #ddd; }
        .order-track { background: #e8f0fe; padding: 8px; margin: 10px; border-radius: 12px; font-size: 0.7rem; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .records-table { background: white; border-radius: 20px; padding: 20px; overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>👩‍🏫 心脏听诊AI实训监控中心</h2>
        <div><span id="studentCount">0</span> 名学生在线</div>
    </div>

    <!-- 配置区：顺序设置 -->
    <div class="config-card">
        <div class="config-title">📋 1. 设定听诊顺序（5个瓣膜区）</div>
        <div class="order-selector" id="orderSelector"></div>
        <button id="saveOrderBtn">保存顺序</button>
        <span id="orderStatus"></span>
    </div>

    <!-- 配置区：模板图上传和标注 -->
    <div class="config-card">
        <div class="config-title">📍 2. 上传模拟人标准照片并标注听诊区（只需做一次）</div>
        <input type="file" id="templateUpload" accept="image/*">
        <button id="uploadTemplateBtn">上传并开始标注</button>
        <canvas id="markingCanvas"></canvas>
        <div id="markingStatus"></div>
        <button id="saveRegionsBtn" style="display:none;">保存5个听诊区位置</button>
    </div>

    <!-- 学生实时画面网格 -->
    <div class="students-grid" id="studentsGrid">
        <div style="grid-column:1/-1; text-align:center; padding:40px; color:#888;">等待学生连接...</div>
    </div>

    <!-- 记录表 -->
    <div class="records-table">
        <h3>📋 考核记录</h3>
        <table id="recordsTable"><thead><tr><th>学生</th><th>时间</th><th>AI评价</th><th>进度</th></tr></thead><tbody id="recordsBody"></tbody></table>
        <button id="exportBtn" style="margin-top: 15px;">导出CSV</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
<script>
    const socket = io();
    let studentsData = new Map();
    let allRecords = [];
    let regionPoints = {};
    let currentRegionIndex = 0;
    const regionNames = ["二尖瓣区", "肺动脉瓣区", "主动脉瓣区", "主动脉瓣第二听诊区", "三尖瓣区"];
    let markingCtx = null;
    let currentImage = null;

    // 生成顺序下拉框
    function initOrderSelector() {
        const container = document.getElementById('orderSelector');
        container.innerHTML = '';
        for (let i = 0; i < 5; i++) {
            const select = document.createElement('select');
            select.id = `step${i+1}`;
            regionNames.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r;
                opt.textContent = r;
                select.appendChild(opt);
            });
            container.appendChild(select);
            if (i < 4) {
                const span = document.createElement('span');
                span.textContent = '→';
                container.appendChild(span);
            }
        }
        // 默认标准顺序
        const defaultOrder = ["二尖瓣区", "肺动脉瓣区", "主动脉瓣区", "主动脉瓣第二听诊区", "三尖瓣区"];
        for (let i = 0; i < 5; i++) {
            document.getElementById(`step${i+1}`).value = defaultOrder[i];
        }
    }
    initOrderSelector();

    // 保存顺序
    document.getElementById('saveOrderBtn').onclick = () => {
        const order = [];
        for (let i = 0; i < 5; i++) order.push(document.getElementById(`step${i+1}`).value);
        fetch('/save_order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ order }) })
            .then(() => document.getElementById('orderStatus').innerText = '✓ 顺序已保存');
    };

    // 上传模板图
    document.getElementById('uploadTemplateBtn').onclick = () => {
        const file = document.getElementById('templateUpload').files[0];
        if (!file) return alert('请先选择图片');
        const formData = new FormData();
        formData.append('template', file);
        fetch('/upload_template', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'ok') {
                    alert('模板图上传成功，现在请在图片上点击5个听诊区位置');
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.getElementById('markingCanvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        markingCtx = canvas.getContext('2d');
                        markingCtx.drawImage(img, 0, 0);
                        canvas.style.display = 'block';
                        currentRegionIndex = 0;
                        regionPoints = {};
                        document.getElementById('markingStatus').innerHTML = `👉 请点击图中“${regionNames[0]}”的位置`;
                        document.getElementById('saveRegionsBtn').style.display = 'inline-block';
                    };
                    img.src = URL.createObjectURL(file);
                } else {
                    alert('上传失败');
                }
            });
    };

    // 画布点击标注
    const canvasElem = document.getElementById('markingCanvas');
    canvasElem.onclick = (e) => {
        if (currentRegionIndex >= 5) return;
        const rect = canvasElem.getBoundingClientRect();
        const scaleX = canvasElem.width / rect.width;
        const scaleY = canvasElem.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        regionPoints[regionNames[currentRegionIndex]] = { x, y };
        markingCtx.fillStyle = 'red';
        markingCtx.beginPath();
        markingCtx.arc(x, y, 6, 0, 2*Math.PI);
        markingCtx.fill();
        markingCtx.fillStyle = 'white';
        markingCtx.font = '14px Arial';
        markingCtx.fillText(regionNames[currentRegionIndex], x+8, y-5);
        currentRegionIndex++;
        if (currentRegionIndex < 5) {
            document.getElementById('markingStatus').innerHTML = `👉 请点击图中“${regionNames[currentRegionIndex]}”的位置`;
        } else {
            document.getElementById('markingStatus').innerHTML = '✅ 所有听诊区已标注，点击“保存5个听诊区位置”';
        }
    };

    // 保存区域坐标
    document.getElementById('saveRegionsBtn').onclick = () => {
        if (Object.keys(regionPoints).length !== 5) {
            alert(`请先标注完5个点，已完成 ${Object.keys(regionPoints).length}/5`);
            return;
        }
        fetch('/save_regions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ regions: regionPoints })
        }).then(() => {
            alert('听诊区位置已保存！学生端将自动使用这些坐标进行考核');
            document.getElementById('saveRegionsBtn').style.display = 'none';
        });
    };

    // Socket 事件
    socket.on('ai_feedback', (data) => {
        let card = document.getElementById(`card-${data.studentId}`);
        if (!card) {
            const grid = document.getElementById('studentsGrid');
            if (grid.children.length === 1 && grid.children[0].innerText.includes('等待')) grid.innerHTML = '';
            card = document.createElement('div');
            card.className = 'student-card';
            card.id = `card-${data.studentId}`;
            card.innerHTML = `
                <div class="student-header"><span>📱 学生: ${data.studentId.slice(-6)}</span><span class="status">实训中</span></div>
                <div class="video-preview"><img id="img-${data.studentId}" src=""></div>
                <div class="ai-feedback" id="fb-${data.studentId}">等待...</div>
                <div class="order-track" id="track-${data.studentId}"></div>
            `;
            grid.appendChild(card);
        }
        if (data.frame) document.getElementById(`img-${data.studentId}`).src = data.frame;
        const fbDiv = document.getElementById(`fb-${data.studentId}`);
        if (fbDiv) fbDiv.innerHTML = `${data.result.message} | ${data.result.progress}`;
        
        const row = document.getElementById('recordsBody').insertRow(0);
        row.insertCell(0).innerText = data.studentId.slice(-6);
        row.insertCell(1).innerText = new Date().toLocaleTimeString();
        row.insertCell(2).innerText = data.result.message;
        row.insertCell(3).innerText = data.result.progress;
        allRecords.unshift({ studentId: data.studentId.slice(-6), time: new Date(), message: data.result.message, progress: data.result.progress });
        document.getElementById('studentCount').innerText = document.querySelectorAll('.student-card').length;
    });

    document.getElementById('exportBtn').onclick = () => {
        let csv = "学生,时间,AI评价,进度\n";
        allRecords.forEach(r => {
            csv += `"${r.studentId}","${r.time.toLocaleString()}","${r.message}","${r.progress}"\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `实训记录_${Date.now()}.csv`;
        a.click();
    };

    setInterval(() => socket.emit('teacher_get_students'), 5000);
</script>
</body>
</html>
