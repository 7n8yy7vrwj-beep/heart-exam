<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师端 - 心脏听诊AI实训监控中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #eef2f7; font-family: system-ui, sans-serif; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        .header { background: #1e466e; color: white; padding: 20px; border-radius: 24px; margin-bottom: 20px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px; }
        .config-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .config-title { font-size: 1.2rem; font-weight: bold; color: #1e466e; margin-bottom: 15px; border-left: 4px solid #2c7da0; padding-left: 12px; }
        .order-selector { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 20px; }
        select { padding: 8px; border-radius: 30px; border: 1px solid #ccc; }
        button { background: #2c7da0; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .region-area { margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd; }
        #markingCanvas { max-width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #ccc; display: none; }
        .students-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .student-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .student-header { background: #2c3e50; color: white; padding: 10px 15px; display: flex; justify-content: space-between; }
        .video-preview { aspect-ratio: 4/3; background: #000; }
        .video-preview video { width: 100%; height: 100%; object-fit: cover; }
        .ai-feedback { padding: 10px; background: #f8f9fa; font-size: 0.8rem; border-top: 1px solid #ddd; }
        .order-track { background: #e8f0fe; padding: 8px; margin: 10px; border-radius: 12px; font-size: 0.7rem; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .records-table { background: white; border-radius: 20px; padding: 20px; overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        .room-control { background: white; border-radius: 20px; padding: 15px 20px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .room-control input { padding: 8px 12px; border-radius: 30px; border: 1px solid #ccc; }
        .status-badge { background: #2e7d32; color: white; padding: 4px 12px; border-radius: 30px; font-size: 0.8rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>👩‍🏫 心脏听诊AI实训监控中心</h2>
        <div><span id="studentCount">0</span> 名学生在线</div>
    </div>

    <!-- 教师端 Peer 控制区 -->
    <div class="room-control">
        <span>📡 房间号：</span>
        <input type="text" id="roomInput" value="heart001" placeholder="输入房间号">
        <button id="startPeerBtn">🚀 启动教师端（等待学生连接）</button>
        <span id="peerStatus" class="status-badge" style="background:#757575;">未启动</span>
    </div>

    <!-- 配置区：顺序设置 -->
    <div class="config-card">
        <div class="config-title">📋 1. 设定听诊顺序（5个瓣膜区）</div>
        <div class="order-selector" id="orderSelector"></div>
        <button id="saveOrderBtn">保存顺序</button>
        <span id="orderStatus"></span>
    </div>

    <!-- 配置区：模板图上传和标注 -->
    <div class="config-card">
        <div class="config-title">📍 2. 上传模拟人标准照片并标注听诊区（只需做一次）</div>
        <input type="file" id="templateUpload" accept="image/*">
        <button id="uploadTemplateBtn">上传并开始标注</button>
        <canvas id="markingCanvas"></canvas>
        <div id="markingStatus"></div>
        <button id="saveRegionsBtn" style="display:none;">保存5个听诊区位置</button>
    </div>

    <!-- 学生实时画面网格 -->
    <div class="students-grid" id="studentsGrid">
        <div style="grid-column:1/-1; text-align:center; padding:40px; color:#888;">教师端启动后，等待学生连接...</div>
    </div>

    <!-- 记录表 -->
    <div class="records-table">
        <h3>📋 考核记录</h3>
        <table id="recordsTable"><thead><tr><th>学生</th><th>时间</th><th>AI评价</th><th>进度</th></tr></thead><tbody id="recordsBody"></tbody></table>
        <button id="exportBtn" style="margin-top: 15px;">导出CSV</button>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    // ----------------------------- Peer 教师端逻辑 -----------------------------
    let peer = null;
    let connections = [];
    const roomInput = document.getElementById('roomInput');
    const startPeerBtn = document.getElementById('startPeerBtn');
    const peerStatusSpan = document.getElementById('peerStatus');
    const studentsGrid = document.getElementById('studentsGrid');
    const recordsBody = document.getElementById('recordsBody');
    const studentCountSpan = document.getElementById('studentCount');

    startPeerBtn.onclick = () => {
        const room = roomInput.value.trim();
        if (!room) {
            alert('请输入房间号');
            return;
        }
        const teacherId = `teacher-${room}`;
        if (peer) {
            peer.destroy();
            connections = [];
            studentsGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#888;">教师端重新启动，等待学生连接...</div>';
        }
        peer = new Peer(teacherId);
        peer.on('open', () => {
            console.log(`教师端已启动，ID: ${teacherId}`);
            peerStatusSpan.innerText = `已启动 (${teacherId})`;
            peerStatusSpan.style.background = '#2e7d32';
        });
        peer.on('connection', (conn) => {
            console.log('学生连接:', conn.peer);
            connections.push(conn);
            const studentId = conn.peer;
            createStudentCard(studentId);
            conn.on('data', (data) => {
                if (data.type === 'ai_result') {
                    updateStudentFeedback(studentId, data);
                    addRecord(studentId, data.message, data.progress);
                }
            });
            conn.on('close', () => {
                const card = document.getElementById(`card-${studentId}`);
                if (card) card.remove();
                updateStudentCount();
            });
        });
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (remoteStream) => {
                const studentId = call.peer;
                const videoElem = document.getElementById(`video-${studentId}`);
                if (videoElem) {
                    videoElem.srcObject = remoteStream;
                }
            });
        });
        peer.on('error', (err) => {
            console.error(err);
            peerStatusSpan.innerText = `错误: ${err.type}`;
            peerStatusSpan.style.background = '#c62828';
        });
    };

    function createStudentCard(studentId) {
        if (studentsGrid.children.length === 1 && studentsGrid.children[0].innerText.includes('等待')) {
            studentsGrid.innerHTML = '';
        }
        const card = document.createElement('div');
        card.className = 'student-card';
        card.id = `card-${studentId}`;
        card.innerHTML = `
            <div class="student-header">
                <span>📱 学生: ${studentId.slice(-6)}</span>
                <span class="status-badge" style="background:#2c7da0;">实训中</span>
            </div>
            <div class="video-preview">
                <video id="video-${studentId}" autoplay playsinline muted></video>
            </div>
            <div class="ai-feedback" id="fb-${studentId}">等待AI反馈...</div>
            <div class="order-track" id="track-${studentId}">⚪ 二尖瓣区 → ⚪ 肺动脉瓣区 → ⚪ 主动脉瓣区 → ⚪ 主动脉瓣第二听诊区 → ⚪ 三尖瓣区</div>
        `;
        studentsGrid.appendChild(card);
        updateStudentCount();
    }

    function updateStudentFeedback(studentId, data) {
        const fbDiv = document.getElementById(`fb-${studentId}`);
        if (fbDiv) fbDiv.innerHTML = `${data.message} | ${data.progress}`;
        if (data.completedRegions) {
            const trackDiv = document.getElementById(`track-${studentId}`);
            if (trackDiv) {
                const regions = ["二尖瓣区", "肺动脉瓣区", "主动脉瓣区", "主动脉瓣第二听诊区", "三尖瓣区"];
                let html = '';
                regions.forEach(r => {
                    if (data.completedRegions.includes(r)) {
                        html += `<span style="color:#2e7d32;">✅ ${r}</span> → `;
                    } else {
                        html += `<span style="color:#999;">⚪ ${r}</span> → `;
                    }
                });
                trackDiv.innerHTML = html.slice(0, -3);
            }
        }
    }

    function addRecord(studentId, message, progress) {
        const row = recordsBody.insertRow(0);
        row.insertCell(0).innerText = studentId.slice(-6);
        row.insertCell(1).innerText = new Date().toLocaleTimeString();
        row.insertCell(2).innerText = message;
        row.insertCell(3).innerText = progress;
        updateStudentCount();
    }

    function updateStudentCount() {
        const count = document.querySelectorAll('.student-card').length;
        studentCountSpan.innerText = count;
    }

    // ----------------------------- 顺序设置和模板标注 -----------------------------
    const regionNames = ["二尖瓣区", "肺动脉瓣区", "主动脉瓣区", "主动脉瓣第二听诊区", "三尖瓣区"];
    function initOrderSelector() {
        const container = document.getElementById('orderSelector');
        container.innerHTML = '';
        for (let i = 0; i < 5; i++) {
            const select = document.createElement('select');
            select.id = `step${i+1}`;
            regionNames.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r;
                opt.textContent = r;
                select.appendChild(opt);
            });
            container.appendChild(select);
            if (i < 4) {
                const span = document.createElement('span');
                span.textContent = '→';
                container.appendChild(span);
            }
        }
        const defaultOrder = ["二尖瓣区", "肺动脉瓣区", "主动脉瓣区", "主动脉瓣第二听诊区", "三尖瓣区"];
        for (let i = 0; i < 5; i++) document.getElementById(`step${i+1}`).value = defaultOrder[i];
    }
    initOrderSelector();

    document.getElementById('saveOrderBtn').onclick = () => {
        const order = [];
        for (let i = 0; i < 5; i++) order.push(document.getElementById(`step${i+1}`).value);
        fetch('/save_order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ order })
        }).then(() => document.getElementById('orderStatus').innerText = '✓ 顺序已保存');
    };

    let regionPoints = {};
    let currentRegionIndex = 0;
    let markingCtx = null;

    document.getElementById('uploadTemplateBtn').onclick = () => {
        const file = document.getElementById('templateUpload').files[0];
        if (!file) return alert('请先选择图片');
        const formData = new FormData();
        formData.append('template', file);
        fetch('/upload_template', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'ok') {
                    alert('模板图上传成功，现在请在图片上点击5个听诊区位置');
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.getElementById('markingCanvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        markingCtx = canvas.getContext('2d');
                        markingCtx.drawImage(img, 0, 0);
                        canvas.style.display = 'block';
                        currentRegionIndex = 0;
                        regionPoints = {};
                        document.getElementById('markingStatus').innerHTML = `👉 请点击图中“${regionNames[0]}”的位置`;
                        document.getElementById('saveRegionsBtn').style.display = 'inline-block';
                    };
                    img.src = URL.createObjectURL(file);
                } else {
                    alert('上传失败');
                }
            });
    };

    const canvasElem = document.getElementById('markingCanvas');
    canvasElem.onclick = (e) => {
        if (currentRegionIndex >= 5) return;
        const rect = canvasElem.getBoundingClientRect();
        const scaleX = canvasElem.width / rect.width;
        const scaleY = canvasElem.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        regionPoints[regionNames[currentRegionIndex]] = { x, y };
        markingCtx.fillStyle = 'red';
        markingCtx.beginPath();
        markingCtx.arc(x, y, 6, 0, 2*Math.PI);
        markingCtx.fill();
        markingCtx.fillStyle = 'white';
        markingCtx.font = '14px Arial';
        markingCtx.fillText(regionNames[currentRegionIndex], x+8, y-5);
        currentRegionIndex++;
        if (currentRegionIndex < 5) {
            document.getElementById('markingStatus').innerHTML = `👉 请点击图中“${regionNames[currentRegionIndex]}”的位置`;
        } else {
            document.getElementById('markingStatus').innerHTML = '✅ 所有听诊区已标注，点击“保存5个听诊区位置”';
        }
    };

    document.getElementById('saveRegionsBtn').onclick = () => {
        if (Object.keys(regionPoints).length !== 5) {
            alert(`请先标注完5个点，已完成 ${Object.keys(regionPoints).length}/5`);
            return;
        }
        fetch('/save_regions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ regions: regionPoints })
        }).then(() => {
            alert('听诊区位置已保存！学生端将自动使用这些坐标进行考核');
            document.getElementById('saveRegionsBtn').style.display = 'none';
        });
    };

    document.getElementById('exportBtn').onclick = () => {
        let csv = "学生,时间,AI评价,进度\n";
        const rows = document.querySelectorAll('#recordsBody tr');
        rows.forEach(row => {
            const cells = row.querySelectorAll('td');
            if (cells.length) {
                csv += `"${cells[0].innerText}","${cells[1].innerText}","${cells[2].innerText}","${cells[3].innerText}"\n`;
            }
        });
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `实训记录_${Date.now()}.csv`;
        a.click();
    };
</script>
</body>
</html>
